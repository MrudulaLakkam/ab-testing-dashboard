<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A/B Testing SDK Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .container {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
    }
    button {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 10px 0;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
    .info {
      background: white;
      padding: 15px;
      border-radius: 4px;
      margin-top: 20px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>A/B Testing SDK Example</h1>
    <p>Click buttons to track events</p>

    <button onclick="trackConversion()">Track Conversion</button>
    <button onclick="trackCustom()">Track Custom Event</button>
    <button onclick="setVariantA()">Set Variant A</button>
    <button onclick="setVariantB()">Set Variant B</button>
    <button onclick="showInfo()">Show SDK Info</button>

    <div class="info" id="info"></div>
  </div>

  <script src="dist/index.js"></script>
  <script>
    // Initialize SDK
    const abtest = new ABTestSDK({
      dashboardUrl: 'https://ab-testing-dashboard-web.vercel.app',
      experimentId: 'homepage-button-test',
      debug: true
    });

    function trackConversion() {
      abtest.trackConversion({
        value: 99.99,
        currency: 'USD',
        source: 'example'
      });
      alert('Conversion tracked!');
    }

    function trackCustom() {
      abtest.trackCustomEvent('button-clicked', {
        buttonId: 'custom-button',
        timestamp: new Date().toISOString()
      });
      alert('Custom event tracked!');
    }

    function setVariantA() {
      abtest.setVariant('variant-a');
      alert('Set to Variant A');
      showInfo();
    }

    function setVariantB() {
      abtest.setVariant('variant-b');
      alert('Set to Variant B');
      showInfo();
    }

    function showInfo() {
      const info = abtest.getInfo();
      document.getElementById('info').innerHTML = JSON.stringify(info, null, 2);
    }

    // Initial display
    showInfo();
  </script>
</body>
</html>
